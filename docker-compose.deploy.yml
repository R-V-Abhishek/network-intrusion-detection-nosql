services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.ec2
    container_name: nids_app
    ports:
      - "80:5000"
    environment:
      NIDS_DISABLE_CASSANDRA: "1"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      INGEST_TOKEN: "${INGEST_TOKEN:-devops-demo}"
      DASHBOARD_DEBUG: "false"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nids_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  redis:
    image: redis:7-alpine
    container_name: nids_redis
    expose:
      - "6379"
    restart: unless-stopped
    networks:
      - nids_net
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  nids_net:
    driver: bridge
