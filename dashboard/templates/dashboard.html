{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Live Dashboard</h2>
  <p class="muted">Overview of current session alerts.</p>
  <div class="row">
    <div class="card" style="min-width: 220px; margin: 0;">
      <div class="muted">Total Alerts</div>
      <div id="total-alerts" style="font-size: 28px; font-weight: 700;">0</div>
    </div>
    <div class="card" style="min-width: 220px; margin: 0;">
      <div class="muted">Current Session</div>
      <div id="session-id" style="font-size: 15px; font-weight: 600;">loading...</div>
    </div>
  </div>
</div>

<div class="card">
  <h3>Recent Alerts</h3>
  <table>
    <thead>
      <tr><th>Time</th><th>Type</th><th>Severity</th><th>Confidence</th></tr>
    </thead>
    <tbody id="recent-table"></tbody>
  </table>
</div>

<script>
async function refreshDashboard() {
  const sessionRes = await fetch('/api/session/current');
  const sessionJson = await sessionRes.json();
  document.getElementById('session-id').textContent = sessionJson.session_id;

  const statsRes = await fetch('/api/alerts/stats');
  const stats = await statsRes.json();
  document.getElementById('total-alerts').textContent = stats.total || 0;

  const alertsRes = await fetch('/api/alerts/recent?limit=10');
  const alerts = await alertsRes.json();
  const body = document.getElementById('recent-table');
  body.innerHTML = '';
  alerts.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${row.alert_time || ''}</td>
      <td>${row.attack_type || 'Unknown'}</td>
      <td><span class="pill ${row.severity || 'info'}">${row.severity || 'info'}</span></td>
      <td>${(row.binary_probability || 0).toFixed(3)}</td>
    `;
    body.appendChild(tr);
  });
}

refreshDashboard();
setInterval(refreshDashboard, 5000);
</script>
{% endblock %}
