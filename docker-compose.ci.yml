# docker-compose.ci.yml
#
# Used by Jenkins ONLY during the Test stage.
# Spins up lightweight versions of Cassandra + Redis so integration
# tests that need real services can run inside the CI environment.
#
# Usage in Jenkinsfile:
#   docker compose -f docker-compose.ci.yml up -d
#   pytest tests/
#   docker compose -f docker-compose.ci.yml down
#
# Your normal docker-compose.yml is used for actual deployment.

version: "3.9"

services:

  redis-ci:
    image: redis:7.2-alpine
    container_name: nids_redis_ci
    ports:
      - "6380:6379"          # Different port so it doesn't clash with local Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  cassandra-ci:
    image: cassandra:4.1
    container_name: nids_cassandra_ci
    ports:
      - "9043:9042"          # Different port so it doesn't clash with local Cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: nids_ci_cluster
      HEAP_NEWSIZE: 128M     # Use less memory in CI
      MAX_HEAP_SIZE: 512M
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 20            # Cassandra takes ~60s to start — give it time
