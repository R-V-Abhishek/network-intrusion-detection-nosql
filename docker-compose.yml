version: "3.9"

services:
  app:
    build: .
    container_name: nids_app
    ports:
      - "5000:5000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - nids_net

  redis:
    image: redis:7-alpine
    container_name: nids_redis
    ports:
      - "6379:6379"
    networks:
      - nids_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  nids_net: